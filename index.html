<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Horse Bloodline</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap');
:root {
  --bg:#f5f5f5;--surface:#fff;--card:#e8edf5;--text:#1a1a1a;--muted:#666e7a;
  --border:#333; --disabled:#d8d8d8;
  --accent-s:#c0392b;--accent-m:#a0369a;
  --s-green:#2d7a2d;--s-green-bg:#d6f0d6;
  --s-blue:#1a5a7a;--s-blue-bg:#cce6f4;
  --m1g:#5a9a5a;--m1g-bg:#edf8ed;
  --m1b:#3a7a9a;--m1b-bg:#e8f4ff;
  --m2p:#b03080;--m2p-bg:#fce8f8;
  --m3s:#c05030;--m3s-bg:#fadadd;
  --tree-purple:#c8c0e8;--tree-dkgreen:#4caf50;
  --tree-e-green:#7dd87a;--tree-g-green:#b8e8b0;
  --tree-e-blue:#7ac8e8;--tree-g-blue:#b0d8f0;--tree-g-yellow:#f0e0a0;
  --tree-i-green:#daf0da;--tree-i-blue:#daeef8;--tree-i-yellow:#f8f0d0;
  --tree-purple2:#b090e0;--tree-orange:#f8c080;--tree-pink:#f8b0d0;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);padding:10px;}
h1{text-align:center;font-size:1.2rem;font-weight:700;letter-spacing:.1em;margin-bottom:14px;padding-bottom:8px;border-bottom:3px solid var(--border);}
h1 .s{color:var(--accent-s);}h1 .m{color:var(--accent-m);}
.tabs{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px;}
.tab-btn{flex-shrink:0;padding:7px 18px;border:1px solid #ccc;background:var(--surface);color:var(--muted);border-radius:20px;cursor:pointer;font-family:inherit;font-size:.85rem;font-weight:500;}
.tab-btn.active{background:#555;color:#fff;border-color:#555;font-weight:700;}
.tab-pane{display:none;}.tab-pane.active{display:block;}
.horse-header{text-align:center;font-size:1rem;font-weight:700;padding:10px;border-radius:10px;margin-bottom:10px;color:#fff;}
.horse-header.stallion{background:var(--accent-s);}
.horse-header.mare{background:var(--accent-m);}
.section-card{background:var(--surface);border:1px solid #ccc;border-radius:10px;padding:10px;margin-bottom:10px;}
.section-title{font-size:.75rem;font-weight:700;color:var(--muted);letter-spacing:.1em;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid #eee;}
.section-title.s{color:var(--accent-s);}.section-title.m{color:var(--accent-m);}
.clear-btn{width:100%;padding:10px;background:#e74c3c;color:#fff;border:none;border-radius:8px;font-family:inherit;font-size:.88rem;font-weight:700;cursor:pointer;margin-bottom:12px;}
.tree-wrap, .pedigree-wrap{overflow-x:auto;}
.tree-table, .pedigree-table{border-collapse:collapse;font-size:.74rem;min-width:500px; width:100%; border:1px solid var(--border);}
.tree-table td, .pedigree-table td, .pedigree-table th{border:1px solid var(--border);padding:0;height:28px;position:relative;}
.tree-sex{text-align:center;font-size:.7rem;color:var(--muted);background:var(--card);width:18px;min-width:18px;}
.tree-table input, .pedigree-table input{width:100%;height:100%;border:none;background:transparent;font-family:inherit;font-size:.72rem;padding:2px 4px;color:var(--text);}
.tree-lbl{position:absolute;top:2px;left:2px;font-size:.55rem;font-weight:700;color:rgba(0,0,0,.38);pointer-events:none;line-height:1;}
.cell-disabled{background:var(--disabled)!important;}
.col-a{background:var(--tree-purple);}.col-c{background:var(--tree-dkgreen);}
.col-e-green{background:var(--tree-e-green);}.col-e-blue{background:var(--tree-e-blue);}
.col-g-green{background:var(--tree-g-green);}.col-g-blue{background:var(--tree-g-blue);}.col-g-yellow{background:var(--tree-g-yellow);}
.col-i-green{background:var(--tree-i-green);}.col-i-blue{background:var(--tree-i-blue);}.col-i-yellow{background:var(--tree-i-yellow);}
.col-c-purple{background:var(--tree-purple2);}.col-e-orange{background:var(--tree-orange);}.col-g-pink{background:var(--tree-pink);}
.pedigree-table th{background:var(--card);color:var(--muted);padding:4px;text-align:center;font-weight:600;font-size:.66rem;}
.label-cell{background:var(--card);color:var(--muted);text-align:center;font-size:.66rem;padding:2px 3px;white-space:nowrap;min-width:22px;}
.cell-off{background:var(--disabled);}
.sg td.bc{background:var(--s-green-bg)!important;}.sg td.bc input{color:var(--s-green);font-weight:600;}
.sb td.bc{background:var(--s-blue-bg)!important;}.sb td.bc input{color:var(--s-blue);font-weight:600;}
.m1g td.bc{background:var(--m1g-bg)!important;}.m1g td.bc input{color:var(--m1g);font-weight:600;}
.m1b td.bc{background:var(--m1b-bg)!important;}.m1b td.bc input{color:var(--m1b);font-weight:600;}
.m2p td.bc{background:var(--m2p-bg)!important;}.m2p td.bc input{color:var(--m2p);font-weight:600;}
.factor-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px; margin-bottom:10px;}
.fc{background:var(--card);border:1px solid #ccc;border-radius:8px;padding:5px 12px;text-align:center;min-width:46px;}
.fc .fl{font-size:.62rem;color:var(--muted);display:block;}
.fc .fv{font-size:1.1rem;font-weight:700;}
.fc.s .fv{color:var(--accent-s);}.fc.m .fv{color:var(--accent-m);}.fc.fin .fv{color:#333;}
.blood-box{border-radius:8px;padding:8px 10px;margin-top:6px;}
.bb-mg{background:var(--m1g-bg);border:1px solid #a0d8a0;}
.bb-mb{background:var(--m1b-bg);border:1px solid #a0c8e8;}
.bb-mp{background:var(--m2p-bg);border:1px solid #e090c0;}
.bb-ms{background:var(--m3s-bg);border:1px solid #e09080;}
.btags{display:flex;flex-wrap:wrap;gap:3px;min-height:20px;}
.btag{border-radius:4px;padding:2px 7px;font-size:.7rem;background:rgba(255,255,255,0.5);border:1px solid rgba(0,0,0,0.1);}
</style>
</head>
<body>
<h1><span class="s">РЎѓ уЅАждг</span> ├Ќ <span class="m">РЎђ уЅЮждг</span> УАђух▒сЃАсЃб</h1>
<div class="tabs">
  <button class="tab-btn active" id="tbtn0">ждг 1</button>
  <button class="tab-btn" id="tbtn1">ждг 2</button>
  <button class="tab-btn" id="tbtn2">ждг 3</button>
  <button class="tab-btn" id="tbtn3">ждг 4</button>
</div>
<div id="tab0" class="tab-pane active"></div>
<div id="tab1" class="tab-pane"></div>
<div id="tab2" class="tab-pane"></div>
<div id="tab3" class="tab-pane"></div>

<script>
const S_TREE=[{sex:'РЎѓ',a:'col-a',c:'col-c',e:'col-e-green',eL:'G',g:'col-g-green',gL:'D',i:'col-i-green',iL:'A'},{sex:'РЎђ',a:'col-a',c:'col-c',e:'col-e-green',eL:null,g:'col-g-green',gL:null,i:'col-i-green',iL:null},{sex:'РЎѓ',a:null,c:null,e:'col-e-blue',eL:null,g:'col-g-blue',gL:'E',i:'col-i-blue',iL:'B'},{sex:'РЎђ',a:null,c:null,e:'col-e-blue',eL:null,g:'col-g-blue',gL:null,i:'col-i-blue',iL:null},{sex:'РЎѓ',a:null,c:null,e:null,eL:null,g:'col-g-yellow',gL:'F',i:'col-i-yellow',iL:'C'},{sex:'РЎђ',a:null,c:null,e:null,eL:null,g:'col-g-yellow',gL:null,i:'col-i-yellow',iL:null}];
const S_ROWS=[{lb:['','','','уѕХ'],sym:'GРЉа',bt:'',tk:{r:0,c:'e'}},{lb:['','','уѕХ','уѕХ'],sym:'G',bt:'',tk:{r:0,c:'e'}},{lb:['','уѕХ','уѕХ','уѕХ'],sym:'',bt:'',tk:null},{lb:['уѕХ','уѕХ','уѕХ','уѕХ'],sym:'',bt:'',tk:null},{lb:['уѕХ','уѕХ','Т»Ї','уѕХ'],sym:'',bt:'',tk:null},{lb:['','уѕХ','Т»Ї','уѕХ'],sym:'D',bt:'',tk:{r:0,c:'g'}},{lb:['уѕХ','Т»Ї','уѕХ','уѕХ'],sym:'',bt:'',tk:null},{lb:['уѕХ','Т»Ї','Т»Ї','уѕХ'],sym:'A',bt:'',tk:{r:0,c:'i'}},{lb:['','','Т»Ї','уѕХ'],sym:'EРЉа',bt:'',tk:{r:2,c:'e'}},{lb:['','Т»Ї','уѕХ','уѕХ'],sym:'E',bt:'',tk:{r:2,c:'e'}},{lb:['Т»Ї','уѕХ','уѕХ','уѕХ'],sym:'',bt:'',tk:null},{lb:['Т»Ї','уѕХ','Т»Ї','уѕХ'],sym:'B',bt:'',tk:{r:2,c:'i'}},{lb:['','Т»Ї','Т»Ї','уѕХ'],sym:'F',bt:'',tk:{r:4,c:'g'}},{lb:['Т»Ї','Т»Ї','уѕХ','уѕХ'],sym:'',bt:'',tk:null},{lb:['Т»Ї','Т»Ї','Т»Ї','уѕХ'],sym:'C',bt:'',tk:{r:4,c:'i'}}];
const M1_ROWS=[{lb:['','','','уѕХ'],sym:'gРЉа',bt:'m2p',tk:{r:0,c:'e'}},{lb:['','','уѕХ','уѕХ'],sym:'g',bt:'',tk:{r:0,c:'e'}},{lb:['','уѕХ','уѕХ','уѕХ'],sym:'РЌЈ',bt:''},{lb:['уѕХ','уѕХ','уѕХ','уѕХ'],sym:'',bt:''},{lb:['уѕХ','уѕХ','Т»Ї','уѕХ'],sym:'',bt:''},{lb:['','уѕХ','Т»Ї','уѕХ'],sym:'d',bt:'',tk:{r:0,c:'g'}},{lb:['уѕХ','Т»Ї','уѕХ','уѕХ'],sym:'',bt:''},{lb:['уѕХ','Т»Ї','Т»Ї','уѕХ'],sym:'a',bt:'',tk:{r:0,c:'i'}},{lb:['','','Т»Ї','уѕХ'],sym:'eРЉа',bt:'',tk:{r:2,c:'e'}},{lb:['','Т»Ї','уѕХ','уѕХ'],sym:'e',bt:'',tk:{r:2,c:'e'}},{lb:['Т»Ї','уѕХ','уѕХ','уѕХ'],sym:'',bt:''},{lb:['Т»Ї','уѕХ','Т»Ї','уѕХ'],sym:'b',bt:'',tk:{r:2,c:'i'}},{lb:['','Т»Ї','Т»Ї','уѕХ'],sym:'f',bt:'',tk:{r:4,c:'g'}},{lb:['Т»Ї','Т»Ї','уѕХ','уѕХ'],sym:'',bt:''},{lb:['Т»Ї','Т»Ї','Т»Ї','уѕХ'],sym:'c',bt:'',tk:{r:4,c:'i'}}];
const M2_ROWS=[{lb:['','','','уѕХ'],sym:'сЂє',bt:'m1g',tk:{r:6,c:'c'}},{lb:['','','уѕХ','уѕХ'],sym:'Рќ▓',bt:''},{lb:['','уѕХ','уѕХ','уѕХ'],sym:'Рќа',bt:''},{lb:['уѕХ','уѕХ','уѕХ','уѕХ'],sym:'',bt:''},{lb:['уѕХ','уѕХ','Т»Ї','уѕХ'],sym:'',bt:''},{lb:['','уѕХ','Т»Ї','уѕХ'],sym:'Рќ│',bt:'m1g'},{lb:['уѕХ','Т»Ї','уѕХ','уѕХ'],sym:'',bt:''},{lb:['уѕХ','Т»Ї','Т»Ї','уѕХ'],sym:'',bt:''},{lb:['','','Т»Ї','уѕХ'],sym:'сЂё',bt:'m1b',tk:{r:6,c:'e'}},{lb:['','Т»Ї','уѕХ','уѕХ'],sym:'РќА',bt:''},{lb:['Т»Ї','уѕХ','уѕХ','уѕХ'],sym:'',bt:''},{lb:['Т»Ї','уѕХ','Т»Ї','уѕХ'],sym:'',bt:''},{lb:['','Т»Ї','Т»Ї','уѕХ'],sym:'сЂѓ',bt:'m1b',tk:{r:6,c:'g'}},{lb:['Т»Ї','Т»Ї','уѕХ','уѕХ'],sym:'',bt:''},{lb:['Т»Ї','Т»Ї','Т»Ї','уѕХ'],sym:'',bt:''}];
const M3_ROWS=[{lb:['','','','уѕХ'],sym:'gРЉА',src:'m1_0'},{lb:['','','уѕХ','уѕХ'],sym:'gРЉа',src:'m1_0'},{lb:['','уѕХ','уѕХ','уѕХ'],sym:'g',src:'m1_1'},{lb:['уѕХ','уѕХ','уѕХ','уѕХ'],sym:'РЌЈ',src:'m1_2'},{lb:['уѕХ','уѕХ','Т»Ї','уѕХ'],sym:'d',src:'m1_5'},{lb:['','уѕХ','Т»Ї','уѕХ'],sym:'eРЉа',src:'m1_8'},{lb:['уѕХ','Т»Ї','уѕХ','уѕХ'],sym:'e',src:'m1_9'},{lb:['уѕХ','Т»Ї','Т»Ї','уѕХ'],sym:'f',src:'m1_12'},{lb:['','','Т»Ї','уѕХ'],sym:'сЂє',src:'m2_0'},{lb:['','Т»Ї','уѕХ','уѕХ'],sym:'Рќ▓',src:'m2_1'},{lb:['Т»Ї','уѕХ','уѕХ','уѕХ'],sym:'Рќа',src:'m2_2'},{lb:['Т»Ї','уѕХ','Т»Ї','уѕХ'],sym:'Рќ│',src:'m2_5'},{lb:['','Т»Ї','Т»Ї','уѕХ'],sym:'сЂё',src:'m2_8'},{lb:['Т»Ї','Т»Ї','уѕХ','уѕХ'],sym:'РќА',src:'m2_9'},{lb:['Т»Ї','Т»Ї','Т»Ї','уѕХ'],sym:'сЂѓ',src:'m2_12'}];
const FACTORS=['жђЪ','жЋи','уЪГ','СИГ','Ух░'];const N=4;

function xid(h,sec,row,col){return 'x'+h+'_'+sec+'_'+row+'_'+col;}
function clean(s){return s?s.replace(/[РЉаРЉАРЉбРЉБРЉц]/g,''):'';}
function getSfx(s){const m=s?s.match(/[РЉаРЉАРЉбРЉБРЉц]/):null;return m?m[0]:'';}

function mkTree(h,rows,pfx,fn){
  var o='<div class="tree-wrap"><table class="tree-table"><tbody>';
  rows.forEach((row,i)=>{
    o+='<tr>';
    [{cl:row.a,k:'a'},{cl:row.c,k:'c',lb:(pfx==='m'&&i===6)?'сЂє':null},{cl:row.e,k:'e',lb:row.eL||null},{cl:row.g,k:'g',lb:row.gL||null},{cl:row.i,k:'i',lb:row.iL||null}].forEach(col=>{
      o+='<td class="tree-sex">'+row.sex+'</td>';
      if(col.cl){
        var l=col.lb?'<span class="tree-lbl">'+col.lb+'</span>':'';
        o+='<td class="'+col.cl+'">'+l+'<input type="text" id="'+xid(h,pfx+'tr',i,col.k)+'" oninput="'+fn+'('+h+','+i+',\''+col.k+'\')"></td>';
      } else o+='<td class="cell-disabled"></td>';
    });
    o+='</tr>';
  });
  return o+'</tbody></table></div>';
}

function mkMtx(h,rows,sec,fn,ro){
  var o='<div class="pedigree-wrap"><table class="pedigree-table"><thead><tr><th colspan="4">у│╗УГю</th><th>ждгтљЇ</th><th>тЏатГљРЉа</th><th>тЏатГљРЉА</th><th>тЏатГљРЉб</th><th>УАђух▒</th></tr></thead><tbody>';
  rows.forEach((row,i)=>{
    var bt=row.bt||''; o+='<tr class="'+bt+'">';
    row.lb.forEach(l=>{o+=l===''?'<td class="cell-off"></td>':'<td class="label-cell">'+l+'</td>';});
    o+='<td class="input-cell"><input type="text" id="'+xid(h,sec,i,'nm')+'" placeholder="'+(row.sym||'ждгтљЇ')+'" '+(ro?'readonly':'')+' oninput="'+fn+'('+h+',\''+sec+'\','+i+',\'nm\')"></td>';
    for(var f=1;f<=3;f++)o+='<td class="input-cell"><input type="text" id="'+xid(h,sec,i,'f'+f)+'" oninput="'+fn+'('+h+',\''+sec+'\','+i+',\'f'+f+'\')"></td>';
    o+='<td class="input-cell '+(bt?'bc':'')+'"><input type="text" id="'+xid(h,sec,i,'bl')+'" oninput="'+fn+'('+h+',\''+sec+'\','+i+',\'bl\')"></td></tr>';
  });
  return o+'</tbody></table></div>';
}

function buildTab(h){
  var html='<button class="clear-btn" onclick="clearTab('+h+')"> ждг'+(h+1)+' тЁесѓ»сЃфсѓб</button>';
  html+='<div class="horse-header stallion"> уЅАждг '+(h+1)+'</div>';
  html+='<div class="section-card"><div class="section-title s">ТјЏсЂЉтљѕсѓЈсЂЏ</div>'+mkTree(h,S_TREE,'s','sTr')+'</div>';
  html+='<div class="section-card"><div class="section-title s">уе«ждг</div>'+mkMtx(h,S_ROWS,'sdt','sMx',false)+'</div>';
  
  html+='<div class="section-card"><div class="section-title s">тЏатГљсЂ«тљѕУеѕ№╝ѕуЅАждгсЃ╗уЅЮждгсЃ╗Тюђухѓ№╝Ѕ</div>';
  html+='<div class="factor-row">'; FACTORS.forEach(f=>{html+='<div class="fc s"><span class="fl">'+f+'(уЅА)</span><span class="fv" id="fc_'+h+'_s_'+f+'">0</span></div>';}); html+='</div>';
  html+='<div class="factor-row">'; FACTORS.forEach(f=>{html+='<div class="fc m"><span class="fl">'+f+'(уЅЮ)</span><span class="fv" id="fc_'+h+'_m_'+f+'">0</span></div>';}); html+='</div>';
  html+='<div class="factor-row">'; FACTORS.forEach(f=>{html+='<div class="fc fin"><span class="fl">'+f+'(Тюђ)</span><span class="fv" id="fc_'+h+'_fin_'+f+'">0</span></div>';}); html+='</div></div>';

  html+='<div class="section-card"><div class="section-title s">УАђух▒сЂЙсЂесѓЂ</div>';
  html+='<div id="bmg_'+h+'" class="bb-mg blood-box"><div class="bb-title">жЮбуЎйсЂёУАђух▒ (УѓїУѓїждг№╝џУќёуиЉ)</div><div class="btags"></div></div>';
  html+='<div id="bmb_'+h+'" class="bb-mb blood-box"><div class="bb-title">УдІС║ІсЂфУАђух▒ (УѓїУѓїждг№╝џУќёТ░┤УЅ▓)</div><div class="btags"></div></div>';
  html+='<div id="bmp_'+h+'" class="bb-mp blood-box"><div class="bb-title">жЮбуЎйУдІС║ІсЂфУАђух▒ (Уѓїуе«ждг№╝џсЃћсЃ│сѓ»)</div><div class="btags"></div></div>';
  html+='<div id="bms_'+h+'" class="bb-ms blood-box"><div class="bb-title">жЮбуЎйУдІС║ІсЂфУАђух▒ (Уѓїждг№╝џсѓхсЃ╝сЃбсЃ│сЃћсЃ│сѓ»)</div><div class="btags"></div></div></div>';
  
  html+='<div class="horse-header mare" style="margin-top:12px"> уЅЮждг '+(h+1)+'</div>';
  html+='<div class="section-card"><div class="section-title m">ТјЏсЂЉтљѕсѓЈсЂЏ</div>'+mkTree(h,S_TREE,'m','mTr')+'</div>';
  html+='<div class="section-card"><div class="section-title m">Уѓїуе«ждг</div>'+mkMtx(h,M1_ROWS,'m1','mMx',false)+'</div>';
  html+='<div class="section-card"><div class="section-title m">УѓїУѓїждг</div>'+mkMtx(h,M2_ROWS,'m2','mMx',false)+'</div>';
  html+='<div class="section-card"><div class="section-title m">Уѓїждг</div>'+mkMtx(h,M3_ROWS,'m3','mMx',true)+'</div>';
  
  document.getElementById('tab'+h).innerHTML=html;
}

function sTr(h,tr,col){
  var val=document.getElementById(xid(h,'str',tr,col)).value||'';
  S_ROWS.forEach((row,i)=>{ if(row.tk&&row.tk.r===tr&&row.tk.c===col) syncGroup(h,'sdt',row.sym,val,'nm'); });
  sUpd(h);
}
function sMx(h,sec,ri,ctype){ syncGroup(h,sec,S_ROWS[ri].sym,document.getElementById(xid(h,sec,ri,ctype)).value,ctype); sUpd(h); }

function mTr(h,tr,col){
  var val=document.getElementById(xid(h,'mtr',tr,col)).value||'';
  M1_ROWS.forEach((row,i)=>{ if(row.tk&&row.tk.r===tr&&row.tk.c===col) syncGroup(h,'m1',row.sym,val,'nm'); });
  M2_ROWS.forEach((row,i)=>{ if(row.tk&&row.tk.r===tr&&row.tk.c===col) syncGroup(h,'m2',row.sym,val,'nm'); });
  mUpd(h);
}
function mMx(h,sec,ri,ctype){ syncGroup(h,sec,(sec==='m1'?M1_ROWS:M2_ROWS)[ri].sym,document.getElementById(xid(h,sec,ri,ctype)).value,ctype); mUpd(h); }

function syncGroup(h,sec,sym,val,ctype){
  if(!sym)return; const bs=clean(sym), bv=clean(val);
  ['sdt','m1','m2'].forEach(s=>{
    const rs=(s==='sdt'?S_ROWS:(s==='m1'?M1_ROWS:M2_ROWS));
    rs.forEach((r,i)=>{
