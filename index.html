<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Horse Bloodline</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap');
:root {
  --bg:#f5f5f5;--surface:#fff;--card:#e8edf5;--text:#1a1a1a;--muted:#666e7a;
  --border:#333; --disabled:#d8d8d8;
  --accent-s:#c0392b;--accent-m:#a0369a;
  --s-green-bg:#d6f0d6; --s-blue-bg:#cce6f4; --m1g-bg:#edf8ed; --m1b-bg:#e8f4ff; --m2p-bg:#fce8f8; --m3s-bg:#fadadd;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);padding:10px;}
h1{text-align:center;font-size:1.2rem;font-weight:700;margin-bottom:14px;padding-bottom:8px;border-bottom:3px solid var(--border);}
.tabs{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;}
.tab-btn{flex-shrink:0;padding:7px 18px;border:1px solid #ccc;background:#fff;border-radius:20px;cursor:pointer;font-size:.85rem;}
.tab-btn.active{background:#555;color:#fff;font-weight:700;}
.tab-pane{display:none;}.tab-pane.active{display:block;}
.horse-header{text-align:center;font-weight:700;padding:10px;border-radius:10px;margin-bottom:10px;color:#fff;}
.stallion{background:var(--accent-s);}.mare{background:var(--accent-m);}
.section-card{background:#fff;border:1px solid #ccc;border-radius:10px;padding:10px;margin-bottom:10px;}
.section-title{font-size:.75rem;font-weight:700;color:var(--muted);margin-bottom:8px;border-bottom:1px solid #eee;}
.clear-btn{width:100%;padding:10px;background:#e74c3c;color:#fff;border:none;border-radius:8px;font-weight:700;margin-bottom:12px;cursor:pointer;}
.pedigree-wrap{overflow-x:auto;}
.pedigree-table{border-collapse:collapse;font-size:.74rem;min-width:500px;width:100%;border:1px solid var(--border);}
.pedigree-table th, .pedigree-table td{border:1px solid var(--border);height:28px;text-align:center;}
.pedigree-table input{width:100%;height:100%;border:none;padding:2px 4px;font-size:.72rem;}
.factor-row{display:flex;gap:6px;margin-bottom:10px;}
.fc{flex:1;background:var(--card);border:1px solid #ccc;border-radius:8px;text-align:center;padding:5px;}
.fc .fl{font-size:.6rem;display:block;color:var(--muted);}
.fc .fv{font-size:1.1rem;font-weight:700;}
.blood-box{border-radius:8px;padding:8px 10px;margin-top:6px;font-size:.75rem;}
.bb-mg{background:var(--m1g-bg);border:1px solid #a0d8a0;}
.bb-mb{background:var(--m1b-bg);border:1px solid #a0c8e8;}
.bb-mp{background:var(--m2p-bg);border:1px solid #e090c0;}
.bb-ms{background:var(--m3s-bg);border:1px solid #e09080;}
.btags{display:flex;flex-wrap:wrap;gap:3px;margin-top:5px;}
.btag{background:rgba(255,255,255,0.5);padding:2px 7px;border-radius:4px;border:1px solid rgba(0,0,0,0.1);}
</style>
</head>
<body>
<h1>тЩВ чЙбщжм ├Ч тЩА чЙЭщжм шбАч╡▒уГбуГв</h1>
<div class="tabs">
  <button class="tab-btn active" onclick="switchTab(0)">щжм 1</button>
  <button class="tab-btn" onclick="switchTab(1)">щжм 2</button>
  <button class="tab-btn" onclick="switchTab(2)">щжм 3</button>
  <button class="tab-btn" onclick="switchTab(3)">щжм 4</button>
</div>
<div id="tab0" class="tab-pane active"></div>
<div id="tab1" class="tab-pane"></div>
<div id="tab2" class="tab-pane"></div>
<div id="tab3" class="tab-pane"></div>

<script>
const N=4; const FACTORS=['щАЯ','щХ╖','чЯн','ф╕н','ш╡░'];
const S_L=['GтСа','G','','','','D','','A','EтСа','E','','B','F','','C'];
const M1_L=['gтСа','g','тЧП','','','d','','a','eтСа','e','','b','f','','c'];
const M2_L=['уБЖ','тЦ▓','тЦа','','','тЦ│','','','уБД','тЦб','','','уБВ','',''];
const M3_L=['gтСб','gтСа','g','тЧП','d','eтСа','e','f','уБЖ','тЦ▓','тЦа','тЦ│','уБД','тЦб','уБВ'];

function build(h){
  let html=`<button class="clear-btn" onclick="clearTab(${h})">щжм${h+1} хЕиуВпуГкуВв</button>`;
  html+=`<div class="horse-header stallion">чЙбщжм ${h+1}</div>`;
  html+=`<div class="section-card"><div class="section-title">чиощжмуГЮуГИуГкуВпуВ╣</div>${mkMx(h,'sdt',S_L)}</div>`;
  html+=`<div class="section-card"><div class="section-title">хЫахнРхРИшиИ</div>`;
  ['s','m','f'].forEach(t=>{ html+=`<div class="factor-row">`; FACTORS.forEach(f=>{ html+=`<div class="fc"><span class="fl">${f}(${t==='s'?'чЙб':t==='m'?'чЙЭ':'цЬА'})</span><span class="fv" id="c_${h}_${t}_${f}">0</span></div>`; }); html+=`</div>`; });
  html+=`</div><div class="section-card"><div class="section-title">шбАч╡▒уБ╛уБиуВБ</div>
    <div class="blood-box bb-mg">щЭвчЩ╜уБД(шВМшВМ:ч╖С) <div class="btags" id="b_${h}_mg"></div></div>
    <div class="blood-box bb-mb">шжЛф║Л(шВМшВМ:ц░┤) <div class="btags" id="b_${h}_mb"></div></div>
    <div class="blood-box bb-mp">щЭвчЩ╜шжЛф║Л(шВМчио:цбГ) <div class="btags" id="b_${h}_mp"></div></div>
    <div class="blood-box bb-ms">щЭвчЩ╜шжЛф║Л(шВМщжм:цйЩ) <div class="btags" id="b_${h}_ms"></div></div>
  </div>`;
  html+=`<div class="horse-header mare">чЙЭщжм ${h+1}</div>`;
  html+=`<div class="section-card"><div class="section-title">шВМчиощжм</div>${mkMx(h,'m1',M1_ROWS=M1_L)}</div>`;
  html+=`<div class="section-card"><div class="section-title">шВМшВМщжм</div>${mkMx(h,'m2',M2_ROWS=M2_L)}</div>`;
  html+=`<div class="section-card"><div class="section-title">шВМщжм (шЗкхЛХхПНцШа)</div>${mkMx(h,'m3',M3_ROWS=M3_L,true)}</div>`;
  document.getElementById('tab'+h).innerHTML=html;
}
function mkMx(h,s,L,ro=false){
  let t='<div class="pedigree-wrap"><table class="pedigree-table"><tr><th>шиШхП╖</th><th>щжмхРН</th><th>хЫахнР1</th><th>хЫахнР2</th><th>хЫахнР3</th><th>шбАч╡▒</th></tr>';
  L.forEach((sym,i)=>{ t+=`<tr><td>${sym}</td><td><input type="text" ${ro?'readonly':''} id="n_${h}_${s}_${i}" oninput="sync(${h},'${s}',${i},'n')"></td><td><input type="text" id="f1_${h}_${s}_${i}" oninput="sync(${h},'${s}',${i},'f1')"></td><td><input type="text" id="f2_${h}_${s}_${i}" oninput="sync(${h},'${s}',${i},'f2')"></td><td><input type="text" id="f3_${h}_${s}_${i}" oninput="sync(${h},'${s}',${i},'f3')"></td><td><input type="text" id="l_${h}_${s}_${i}" oninput="sync(${h},'${s}',${i},'l')"></td></tr>`; });
  return t+'</table></div>';
}
function sync(h,s,i,type){
  let val=document.getElementById(`${type}_${h}_${s}_${i}`).value;
  let sym=(s==='sdt'?S_L:(s==='m1'?M1_L:M2_L))[i];
  if(sym){
    let base=sym.replace(/[тСатСб]/g,'');
    ['sdt','m1','m2'].forEach(sec=>{
      let L=(sec==='sdt'?S_L:(sec==='m1'?M1_L:M2_L));
      L.forEach((ss,si)=>{ if(ss.replace(/[тСатСб]/g,'')===base){ document.getElementById(`${type}_${h}_${sec}_${si}`).value=val; }});
    });
  }
  upd(h);
}
function upd(h){
  let sc={}, mc={}; FACTORS.forEach(f=>{sc[f]=0;mc[f]=0;});
  M3_L.forEach((sym,i)=>{
    let src=sym==='gтСб'||sym==='gтСа'?'m1_0':sym==='уБЖ'?'m2_0':sym==='уБД'?'m2_8':sym==='уБВ'?'m2_12':null;
    if(src){ let p=src.split('_'); ['n','f1','f2','f3','l'].forEach(c=>{ document.getElementById(`${c}_${h}_m3_${i}`).value=document.getElementById(`${c}_${h}_${p[0]}_${p[1]}`).value; });}
  });
  for(let i=0;i<15;i++){ [1,2,3].forEach(n=>{ let v=document.getElementById(`f${n}_${h}_sdt_${i}`).value; if(sc.hasOwnProperty(v))sc[v]++; }); }
  for(let i=0;i<15;i++){ [1,2,3].forEach(n=>{ let v=document.getElementById(`f${n}_${h}_m3_${i}`).value; if(mc.hasOwnProperty(v))mc[v]++; }); }
  FACTORS.forEach(f=>{ document.getElementById(`c_${h}_s_${f}`).textContent=sc[f]; document.getElementById(`c_${h}_m_${f}`).textContent=mc[f]; document.getElementById(`c_${h}_f_${f}`).textContent=sc[f]+mc[f]; });
  setB(h,'mg','m2',[0,5]); setB(h,'mb','m2',[8,12]); setB(h,'mp','m1',[0]);
  let ms=[]; [0,4,5,7,8,12,14].forEach(idx=>{ let v=document.getElementById(`l_${h}_m3_${idx}`).value; if(v)ms.push(`<span class="btag">${v}</span>`); });
  document.getElementById(`b_${h}_ms`).innerHTML=ms.join('');
}
function setB(h,id,s,idx){
  let arr=[]; idx.forEach(i=>{ let v=document.getElementById(`l_${h}_${s}_${i}`).value; if(v)arr.push(`<span class="btag">${v}</span>`); });
  document.getElementById(`b_${h}_${id}`).innerHTML=arr.join('');
}
function clearTab(h){ document.getElementById('tab'+h).querySelectorAll('input').forEach(i=>i.value=''); upd(h); }
function switchTab(idx){ for(let i=0;i<N;i++){ document.querySelectorAll('.tab-btn')[i].classList.toggle('active',i===idx); document.getElementById('tab'+i).classList.toggle('active',i===idx); } }
for(let h=0;h<N;h++) build(h);
</script>
</body>
</html>
