<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Horse Bloodline</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap');
:root {
  --bg:#f5f5f5;--surface:#fff;--card:#e8edf5;--text:#1a1a1a;--muted:#666e7a;
  --border:#333; --disabled:#d8d8d8;
  --accent-s:#c0392b;--accent-m:#a0369a;
  --s-green-bg:#d6f0d6; --s-blue-bg:#cce6f4; --m1g-bg:#edf8ed; --m1b-bg:#e8f4ff; --m2p-bg:#fce8f8; --m3s-bg:#fadadd;
  --tree-purple:#c8c0e8;--tree-dkgreen:#4caf50;--tree-e-green:#7dd87a;--tree-g-green:#b8e8b0;--tree-e-blue:#7ac8e8;--tree-g-blue:#b0d8f0;--tree-g-yellow:#f0e0a0;--tree-i-green:#daf0da;--tree-i-blue:#daeef8;--tree-i-yellow:#f8f0d0;--tree-purple2:#b090e0;--tree-orange:#f8c080;--tree-pink:#f8b0d0;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);padding:10px;}
h1{text-align:center;font-size:1.2rem;font-weight:700;margin-bottom:14px;padding-bottom:8px;border-bottom:3px solid var(--border);}
.tabs{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;}
.tab-btn{flex-shrink:0;padding:7px 18px;border:1px solid #ccc;background:#fff;border-radius:20px;cursor:pointer;font-size:.85rem;}
.tab-btn.active{background:#555;color:#fff;font-weight:700;}
.tab-pane{display:none;}.tab-pane.active{display:block;}
.horse-header{text-align:center;font-weight:700;padding:10px;border-radius:10px;margin-bottom:10px;color:#fff;}
.stallion{background:var(--accent-s);}.mare{background:var(--accent-m);}
.section-card{background:#fff;border:1px solid #ccc;border-radius:10px;padding:10px;margin-bottom:10px;}
.section-title{font-size:.75rem;font-weight:700;color:var(--muted);margin-bottom:8px;border-bottom:1px solid #eee;}
.clear-btn{width:100%;padding:10px;background:#e74c3c;color:#fff;border:none;border-radius:8px;font-weight:700;margin-bottom:12px;cursor:pointer;}
.tree-wrap, .pedigree-wrap{overflow-x:auto;}
.tree-table, .pedigree-table{border-collapse:collapse;font-size:.74rem;min-width:500px;width:100%;border:1px solid var(--border);}
.tree-table td, .pedigree-table td, .pedigree-table th{border:1px solid var(--border);height:28px;position:relative;text-align:center;}
.tree-sex{background:var(--card);width:18px;}
.tree-table input, .pedigree-table input{width:100%;height:100%;border:none;background:transparent;padding:2px 4px;font-size:.72rem;}
.tree-lbl{position:absolute;top:2px;left:2px;font-size:.55rem;font-weight:700;color:#999;pointer-events:none;line-height:1;}
.label-cell{background:var(--card);color:var(--muted);padding:2px 3px;white-space:nowrap;min-width:22px;}
.factor-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;}
.fc{background:var(--card);border:1px solid #ccc;border-radius:8px;padding:5px 12px;text-align:center;min-width:46px;}
.fc .fl{font-size:.62rem;color:var(--muted);display:block;}
.fc .fv{font-size:1.1rem;font-weight:700;}
.blood-box{border-radius:8px;padding:8px 10px;margin-top:6px;font-size:.75rem;}
.bb-sg{background:var(--s-green-bg);border:1px solid #90c890;}.bb-sb{background:var(--s-blue-bg);border:1px solid #90b8d8;}
.bb-mg{background:var(--m1g-bg);border:1px solid #a0d8a0;}.bb-mb{background:var(--m1b-bg);border:1px solid #a0c8e8;}
.bb-mp{background:var(--m2p-bg);border:1px solid #e090c0;}.bb-ms{background:var(--m3s-bg);border:1px solid #e09080;}
.btags{display:flex;flex-wrap:wrap;gap:3px;margin-top:5px;}
.btag{background:rgba(255,255,255,0.5);padding:2px 7px;border-radius:4px;border:1px solid rgba(0,0,0,0.1);}
</style>
</head>
<body>
<h1>♂ 牡馬 × ♀ 牝馬 血統メモ</h1>
<div class="tabs">
  <button class="tab-btn active" id="tbtn0" onclick="switchTab(0)">馬 1</button>
  <button class="tab-btn" id="tbtn1" onclick="switchTab(1)">馬 2</button>
  <button class="tab-btn" id="tbtn2" onclick="switchTab(2)">馬 3</button>
  <button class="tab-btn" id="tbtn3" onclick="switchTab(3)">馬 4</button>
</div>
<div id="tab0" class="tab-pane active"></div>
<div id="tab1" class="tab-pane"></div>
<div id="tab2" class="tab-pane"></div>
<div id="tab3" class="tab-pane"></div>

<script>
const N=4; const FACTORS=['速','長','短','中','走'];
const S_TREE=[{sex:'♂',a:'col-a',c:'col-c',e:'col-e-green',eL:'G',g:'col-g-green',gL:'D',i:'col-i-green',iL:'A'},{sex:'♀',a:'col-a',c:'col-c',e:'col-e-green',eL:null,g:'col-g-green',gL:null,i:'col-i-green',iL:null},{sex:'♂',a:null,c:null,e:'col-e-blue',eL:null,g:'col-g-blue',gL:'E',i:'col-i-blue',iL:'B'},{sex:'♀',a:null,c:null,e:'col-e-blue',eL:null,g:'col-g-blue',gL:null,i:'col-i-blue',iL:null},{sex:'♂',a:null,c:null,e:null,eL:null,g:'col-g-yellow',gL:'F',i:'col-i-yellow',iL:'C'},{sex:'♀',a:null,c:null,e:null,eL:null,g:'col-g-yellow',gL:null,i:'col-i-yellow',iL:null}];
const S_ROWS=[{lb:['','','','父'],sym:'G①',bt:'sg',tk:null},{lb:['','','父','父'],sym:'G',bt:'',tk:{r:0,c:'e'}},{lb:['','父','父','父'],sym:'',bt:'',tk:null},{lb:['父','父','父','父'],sym:'',bt:'',tk:null},{lb:['父','父','母','父'],sym:'',bt:'sb',tk:null},{lb:['','父','母','父'],sym:'D',bt:'sg',tk:{r:0,c:'g'}},{lb:['父','母','父','父'],sym:'',bt:'',tk:null},{lb:['父','母','母','父'],sym:'A',bt:'sb',tk:{r:0,c:'i'}},{lb:['','','母','父'],sym:'E①',bt:'sg',tk:null},{lb:['','母','父','父'],sym:'E',bt:'',tk:{r:2,c:'e'}},{lb:['母','父','父','父'],sym:'',bt:'',tk:null},{lb:['母','父','母','父'],sym:'B',bt:'sb',tk:{r:2,c:'i'}},{lb:['','母','母','父'],sym:'F',bt:'sg',tk:{r:4,c:'g'}},{lb:['母','母','父','父'],sym:'',bt:'',tk:null},{lb:['母','母','母','父'],sym:'C',bt:'sb',tk:{r:4,c:'i'}}];
const M1_ROWS=[{lb:['','','','父'],sym:'g①',bt:'m1g',tk:{r:0,c:'e'}},{lb:['','','父','父'],sym:'g',bt:'',tk:{r:0,c:'e'}},{lb:['','父','父','父'],sym:'●',bt:''},{lb:['父','父','父','父'],sym:'',bt:''},{lb:['父','父','母','父'],sym:'',bt:'m1b'},{lb:['','父','母','父'],sym:'d',bt:'m1g',tk:{r:0,c:'g'}},{lb:['父','母','父','父'],sym:'',bt:''},{lb:['父','母','母','父'],sym:'a',bt:'m1b',tk:{r:0,c:'i'}},{lb:['','','母','父'],sym:'e①',bt:'m1g',tk:{r:2,c:'e'}},{lb:['','母','父','父'],sym:'e',bt:'',tk:{r:2,c:'e'}},{lb:['母','父','父','父'],sym:'',bt:''},{lb:['母','父','母','父'],sym:'b',bt:'m1b',tk:{r:2,c:'i'}},{lb:['','母','母','父'],sym:'f',bt:'m1g',tk:{r:4,c:'g'}},{lb:['母','母','父','父'],sym:'',bt:''},{lb:['母','母','母','父'],sym:'c',bt:'m1b',tk:{r:4,c:'i'}}];
const M2_ROWS=[{lb:['','','','父'],sym:'う',bt:'m2p',tk:{r:6,c:'c'}},{lb:['','','父','父'],sym:'▲',bt:''},{lb:['','父','父','父'],sym:'■',bt:''},{lb:['父','父','父','父'],sym:'',bt:''},{lb:['父','父','母','父'],sym:'',bt:''},{lb:['','父','母','父'],sym:'△',bt:'m2p'},{lb:['父','母','父','父'],sym:'',bt:''},{lb:['父','母','母','父'],sym:'',bt:''},{lb:['','','母','父'],sym:'い',bt:'m2p',tk:{r:6,c:'e'}},{lb:['','母','父','父'],sym:'□',bt:''},{lb:['母','父','父','父'],sym:'',bt:''},{lb:['母','父','母','父'],sym:'',bt:''},{lb:['','母','母','父'],sym:'あ',bt:'m2p',tk:{r:6,c:'g'}},{lb:['母','母','父','父'],sym:'',bt:''},{lb:['母','母','母','父'],sym:'',bt:''}];
const M3_ROWS=[{lb:['','','','父'],sym:'g②',src:'m1_0'},{lb:['','','父','父'],sym:'g①',src:'m1_0'},{lb:['','父','父','父'],sym:'g',src:'m1_1'},{lb:['父','父','父','父'],sym:'●',src:'m1_2'},{lb:['父','父','母','父'],sym:'d',src:'m1_5'},{lb:['','父','母','父'],sym:'e①',src:'m1_8'},{lb:['父','母','父','父'],sym:'e',src:'m1_9'},{lb:['父','母','母','父'],sym:'f',src:'m1_12'},{lb:['','','母','父'],sym:'う',src:'m2_0'},{lb:['','母','父','父'],sym:'▲',src:'m2_1'},{lb:['母','父','父','父'],sym:'■',src:'m2_2'},{lb:['母','父','母','父'],sym:'△',src:'m2_5'},{lb:['','母','母','父'],sym:'い',src:'m2_8'},{lb:['母','母','父','父'],sym:'□',src:'m2_9'},{lb:['母','母','母','父'],sym:'あ',src:'m2_12'}];

function xid(h,s,r,c){return `x${h}_${s}_${r}_${c}`;}
function sfx(s){if(!s)return '';let m=s.match(/[①②]/);return m?m[0]:'';}

function build(h){
  let html=`<button class="clear-btn" onclick="clearTab(${h})">馬${h+1} 全クリア</button>`;
  html+=`<div class="horse-header stallion">牡馬 ${h+1}</div>`;
  html+=`<div class="section-card"><div class="section-title">掛け合わせ</div>${mkTree(h,S_TREE,'s','sTr')}</div>`;
  html+=`<div class="section-card"><div class="section-title">種馬</div>${mkMx(h,S_ROWS,'sdt','sMx',false)}</div>`;
  html+=`<div class="section-card">` + mkFC(h,'s','牡馬因子') + mkFC(h,'m','牝馬因子') + mkFC(h,'fin','最終合計') + `</div>`;
  html+=`<div class="section-card"><div class="section-title">血統まとめ</div><div class="btags" id="bsg_${h}"></div><div class="btags" id="bsb_${h}"></div><div class="btags" id="bms_${h}"></div></div>`;
  html+=`<div class="horse-header mare">牝馬 ${h+1}</div>`;
  html+=`<div class="section-card"><div class="section-title">肌種馬</div>${mkMx(h,M1_ROWS,'m1','mMx',false)}</div>`;
  html+=`<div class="section-card"><div class="section-title">肌肌馬</div>${mkMx(h,M2_ROWS,'m2','mMx',false)}</div>`;
  html+=`<div class="section-card"><div class="section-title">肌馬</div>${mkMx(h,M3_ROWS,'m3','mMx',true)}</div>`;
  document.getElementById('tab'+h).innerHTML=html;
}

function mkTree(h,rows,pfx,fn){
  let o='<div class="tree-wrap"><table class="tree-table">';
  rows.forEach((r,i)=>{
    o+='<tr>';
    [{cl:r.a,k:'a'},{cl:r.c,k:'c',lb:(pfx==='m'&&i===6)?'う':null},{cl:r.e,k:'e',lb:r.eL||null},{cl:r.g,k:'g',lb:r.gL||null},{cl:r.i,k:'i',lb:r.iL||null}].forEach(col=>{
      o+=`<td class="tree-sex">${r.sex}</td>`;
      if(col.cl){
        let l=col.lb?`<span class="tree-lbl">${col.lb}</span>`:'';
        o+=`<td class="${col.cl}">${l}<input type="text" id="${xid(h,pfx+'tr',i,col.k)}" oninput="${fn}(${h},${i},'${col.k}')"></td>`;
      } else o+='<td class="cell-disabled"></td>';
    });
    o+='</tr>';
  });
  return o+'</table></div>';
}

function mkMx(h,rows,sec,fn,ro){
  let o='<div class="pedigree-wrap"><table class="pedigree-table"><tr><th>記号</th><th>馬名</th><th>因子1</th><th>因子2</th><th>因子3</th><th>血統</th></tr>';
  rows.forEach((r,i)=>{
    o+=`<tr><td class="label-cell">${r.sym||''}</td><td><input type="text" id="${xid(h,sec,i,'nm')}" ${ro?'readonly':''} oninput="${fn}(${h},'${sec}',${i})"></td>`;
    for(let f=1;f<=3;f++) o+=`<td><input type="text" id="${xid(h,sec,i,'f'+f)}" oninput="${fn}(${h},'${sec}',${i})"></td>`;
    o+=`<td><input type="text" id="${xid(h,sec,i,'bl')}" oninput="${fn}(${h},'${sec}',${i})"></td></tr>`;
  });
  return o+'</table></div>';
}

function mkFC(h,pfx,title){
  let o=`<div class="section-title">${title}</div><div class="factor-row">`;
  FACTORS.forEach(f=>{o+=`<div class="fc"><span class="fl">${f}</span><span class="fv" id="fc_${h}_${pfx}_${f}">0</span></div>`;});
  return o+'</div>';
}

function switchTab(idx){for(let i=0;i<N;i++){document.getElementById('tbtn'+i).classList.toggle('active',i===idx);document.getElementById('tab'+i).classList.toggle('active',i===idx);}}

function sTr(h,tr,col){
  let val=document.getElementById(xid(h,'str',tr,col)).value||'';
  let label=S_TREE[tr][col+'L'];
  if(label){
    let base=label.replace(/[①②]/g,'');
    S_ROWS.forEach((r,i)=>{ if((r.sym||'').replace(/[①②]/g,'')===base){ let el=document.getElementById(xid(h,'sdt',i,'nm')); if(el)el.value=val+(val?sfx(r.sym):''); }});
  }
  upd(h);
}

function sMx(h,sec,ri){upd(h);}
function mMx(h,sec,ri){upd(h);}

function upd(h){
  M3_ROWS.forEach((r,i)=>{ if(r.src){ let p=r.src.split('_'); ['nm','f1','f2','f3','bl'].forEach(c=>{ document.getElementById(xid(h,'m3',i,c)).value=document.getElementById(xid(h,p[0],p[1],c)).value; }); }});
  FACTORS.forEach(f=>{
    let s=0, m=0;
    S_ROWS.forEach((_,i)=>{ for(let j=1;j<=3;j++) if(document.getElementById(xid(h,'sdt',i,'f'+j)).value===f) s++; });
    M3_ROWS.forEach((_,i)=>{ for(let j=1;j<=3;j++) if(document.getElementById(xid(h,'m3',i,'f'+j)).value===f) m++; });
    document.getElementById(`fc_${h}_s_${f}`).textContent=s;
    document.getElementById(`fc_${h}_m_${f}`).textContent=m;
    document.getElementById(`fc_${h}_fin_${f}`).textContent=s+m;
  });
}

function clearTab(h){document.getElementById('tab'+h).querySelectorAll('input').forEach(el=>el.value='');upd(h);}

for(let h=0;h<N;h++) build(h);
</script>
</body>
</html>
