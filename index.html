<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Horse Bloodline - 最終改善版</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap');
:root {
  --bg:#f5f5f5;--surface:#fff;--card:#e8edf5;--text:#1a1a1a;--muted:#666e7a;
  --border:#333; --disabled:#d8d8d8;
  --accent-s:#c0392b;--accent-m:#a0369a;
  --s-green-bg:#d6f0d6; --s-blue-bg:#cce6f4;
  --m1g-bg:#edf8ed; --m1b-bg:#e8f4ff; --m2p-bg:#fce8f8; --m3s-bg:#fadadd;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);padding:10px;padding-bottom:100px;}

/* 保存・読込ボタンエリア */
.save-panel { background:#333; padding:15px; border-radius:10px; margin-bottom:15px; display:flex; gap:10px; position:sticky; top:0; z-index:100; box-shadow:0 4px 10px rgba(0,0,0,0.3); }
.io-btn { flex:1; padding:12px; border:none; border-radius:8px; font-weight:700; cursor:pointer; color:#fff; font-size:0.9rem; display:flex; align-items:center; justify-content:center; }
.btn-export { background:#27ae60; }
.btn-import { background:#2980b9; }

h1{text-align:center;font-size:1.2rem;margin:10px 0;border-bottom:3px solid var(--border);}
.tabs{display:flex;gap:5px;margin-bottom:10px;overflow-x:auto;}
.tab-btn{flex-shrink:0;padding:10px 20px;border:1px solid #ccc;background:#fff;border-radius:20px;cursor:pointer;white-space:nowrap;}
.tab-btn.active{background:#555;color:#fff;font-weight:700;}
.tab-pane{display:none;}.tab-pane.active{display:block;}

/* デザイン */
.section-card{background:var(--surface);border:1px solid #ccc;border-radius:10px;padding:10px;margin-bottom:10px;}
.horse-header{text-align:center;font-size:1rem;font-weight:700;padding:10px;border-radius:10px;margin-bottom:10px;color:#fff;}
.horse-header.stallion{background:var(--accent-s);}
.horse-header.mare{background:var(--accent-m);}
.tree-wrap, .pedigree-wrap{overflow-x:auto; margin-bottom: 10px;}
.tree-table, .pedigree-table{border-collapse:collapse;font-size:.74rem;min-width:500px; width:100%; border:1px solid var(--border);}
.tree-table td, .pedigree-table td, .pedigree-table th{border:1px solid var(--border);padding:0;height:28px;position:relative;}
.tree-table input, .pedigree-table input{width:100%;height:100%;border:none;background:transparent;padding:2px 4px;font-size:0.75rem;}
.factor-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;}
.fc{background:var(--card);border:1px solid #ccc;border-radius:8px;padding:5px 12px;text-align:center;min-width:55px;}
.fc .fv{font-size:1.1rem;font-weight:700;}
.blood-box{border-radius:8px;padding:8px 10px;margin-top:6px; border:1px solid #ccc;}
.btags{display:flex;flex-wrap:wrap;gap:3px;min-height:20px;}
.btag{border-radius:4px;padding:2px 7px;font-size:.7rem;background:rgba(255,255,255,0.5);border:1px solid rgba(0,0,0,0.1);}
.clear-btn{width:100%;padding:10px;background:#e74c3c;color:#fff;border:none;border-radius:8px;font-weight:700;margin-bottom:12px;}
</style>
</head>
<body>

<div class="save-panel">
  <button class="io-btn btn-export" onclick="manualExport()">💾 データを保存(書出)</button>
  <button class="io-btn btn-import" onclick="document.getElementById('fileInput').click()">📂 データを復元(読込)</button>
  <input type="file" id="fileInput" style="display:none" accept=".json" onchange="manualImport(event)">
</div>

<h1><span style="color:var(--accent-s)">♂ 牡馬</span> × <span style="color:var(--accent-m)">♀ 牝馬</span> 血統メモ</h1>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab(0)">馬 1</button>
  <button class="tab-btn" onclick="switchTab(1)">馬 2</button>
  <button class="tab-btn" onclick="switchTab(2)">馬 3</button>
  <button class="tab-btn" onclick="switchTab(3)">馬 4</button>
</div>

<div id="app-content">
  <div id="tab0" class="tab-pane active"></div>
  <div id="tab1" class="tab-pane"></div>
  <div id="tab2" class="tab-pane"></div>
  <div id="tab3" class="tab-pane"></div>
</div>

<script>
// 定数
const S_TREE=[{sex:'♂',a:'col-a',c:'col-c',e:'col-e-green',eL:'G',g:'col-g-green',gL:'D',i:'col-i-green',iL:'A'},{sex:'♀',a:'col-a',c:'col-c',e:'col-e-green',eL:null,g:'col-g-green',gL:null,i:'col-i-green',iL:null},{sex:'♂',a:null,c:null,e:'col-e-blue',eL:null,g:'col-g-blue',gL:'E',i:'col-i-blue',iL:'B'},{sex:'♀',a:null,c:null,e:'col-e-blue',eL:null,g:'col-g-blue',gL:null,i:'col-i-blue',iL:null},{sex:'♂',a:null,c:null,e:null,eL:null,g:'col-g-yellow',gL:'F',i:'col-i-yellow',iL:'C'},{sex:'♀',a:null,c:null,e:null,eL:null,g:'col-g-yellow',gL:null,i:'col-i-yellow',iL:null}];
const S_ROWS=[{lb:['','','','父'],sym:'G①',bt:'sg'},{lb:['','','父','父'],sym:'G',bt:''},{lb:['','父','父','父'],sym:'',bt:''},{lb:['父','父','父','父'],sym:'',bt:''},{lb:['父','父','母','父'],sym:'',bt:'sb'},{lb:['','父','母','父'],sym:'D',bt:'sg'},{lb:['父','母','父','父'],sym:'',bt:''},{lb:['父','母','母','父'],sym:'A',bt:'sb'},{lb:['','','母','父'],sym:'E①',bt:'sg'},{lb:['','母','父','父'],sym:'E',bt:''},{lb:['母','父','父','父'],sym:'',bt:''},{lb:['母','父','母','父'],sym:'B',bt:'sb'},{lb:['','母','母','父'],sym:'F',bt:'sg'},{lb:['母','母','父','父'],sym:'',bt:''},{lb:['母','母','母','父'],sym:'C',bt:'sb'}];
const M_TREE=[{sex:'♂',a:'col-a',c:'col-c',e:'col-e-green',eL:'g',g:'col-g-green',gL:'d',i:'col-i-green',iL:'a'},{sex:'♀',a:'col-a',c:'col-c',e:'col-e-green',eL:null,g:'col-g-green',gL:null,i:'col-i-green',iL:null},{sex:'♂',a:null,c:null,e:'col-e-blue',eL:null,g:'col-g-blue',gL:'e',i:'col-i-blue',iL:'b'},{sex:'♀',a:null,c:null,e:'col-e-blue',eL:null,g:'col-g-blue',gL:null,i:'col-i-blue',iL:null},{sex:'♂',a:null,c:null,e:null,eL:null,g:'col-g-yellow',gL:'f',i:'col-i-yellow',iL:'c'},{sex:'♀',a:null,c:null,e:null,eL:null,g:'col-g-yellow',gL:null,i:'col-i-yellow',iL:null},{sex:'♂',a:null,c:'col-c-purple',e:'col-e-orange',eL:'い',g:'col-g-pink',gL:'あ',i:null,iL:null},{sex:'♀',a:null,c:'col-c-purple',e:'col-e-orange',eL:null,g:'col-g-pink',gL:null,i:null,iL:null}];
const M1=[{lb:['','','','父'],sym:'g①',bt:'m1g'},{lb:['','','父','父'],sym:'g',bt:''},{lb:['','父','父','父'],sym:'●',bt:''},{lb:['父','父','父','父'],sym:'',bt:''},{lb:['父','父','母','父'],sym:'',bt:'m1b'},{lb:['','父','母','父'],sym:'d',bt:'m1g'},{lb:['父','母','父','父'],sym:'',bt:''},{lb:['父','母','母','父'],sym:'a',bt:'m1b'},{lb:['','','母','父'],sym:'e①',bt:'m1g'},{lb:['','母','父','父'],sym:'e',bt:''},{lb:['母','父','父','父'],sym:'',bt:''},{lb:['母','父','母','父'],sym:'b',bt:'m1b'},{lb:['','母','母','父'],sym:'f',bt:'m1g'},{lb:['母','母','父','父'],sym:'',bt:''},{lb:['母','母','母','父'],sym:'c',bt:'m1b'}];
const M2=[{lb:['','','','父'],sym:'う',bt:'m2p'},{lb:['','','父','父'],sym:'▲',bt:''},{lb:['','父','父','父'],sym:'■',bt:''},{lb:['父','父','父','父'],sym:'',bt:''},{lb:['父','父','母','父'],sym:'',bt:''},{lb:['','父','母','父'],sym:'△',bt:'m2p'},{lb:['父','母','父','父'],sym:'',bt:''},{lb:['父','母','母','父'],sym:'',bt:''},{lb:['','','母','父'],sym:'い',bt:'m2p'},{lb:['','母','父','父'],sym:'□',bt:''},{lb:['母','父','父','父'],sym:'',bt:''},{lb:['母','父','母','父'],sym:'',bt:''},{lb:['','母','母','父'],sym:'あ',bt:'m2p'},{lb:['母','母','父','父'],sym:'',bt:''},{lb:['母','母','母','父'],sym:'',bt:''}];
const M3=[{lb:['','','','父'],sym:'g②',src:null,sal:true},{lb:['','','父','父'],sym:'g①',sal:false},{lb:['','父','父','父'],sym:'g',sal:false},{lb:['父','父','父','父'],sym:'●',sal:false},{lb:['父','父','母','父'],sym:'d',sal:false},{lb:['','父','母','父'],sym:'e①',sal:true},{lb:['父','母','父','父'],sym:'e',sal:false},{lb:['父','母','母','父'],sym:'f',sal:false},{lb:['','','母','父'],sym:'う',sal:true},{lb:['','母','父','父'],sym:'▲',sal:false},{lb:['母','父','父','父'],sym:'■',sal:false},{lb:['母','父','母','父'],sym:'△',sal:false},{lb:['','母','母','父'],sym:'い',sal:true},{lb:['母','父','母','父'],sym:'□',sal:false},{lb:['母','母','母','父'],sym:'あ',sal:false}];
const FACTORS=['速','長','短','中','走'];const N=4;
const DB_KEY = 'UMA_DATA_FINAL_V1';

// 保存・読込
function autoSave(){
  const data = {};
  document.querySelectorAll('input[id^="x"]').forEach(el => { if(el.value) data[el.id] = el.value; });
  localStorage.setItem(DB_KEY, JSON.stringify(data));
}
function manualExport(){
  autoSave();
  const saved = localStorage.getItem(DB_KEY);
  if(!saved) { alert("データがありません"); return; }
  const blob = new Blob([saved], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'uma_data_backup.json';
  a.click();
}
function manualImport(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const data = JSON.parse(ev.target.result);
      document.querySelectorAll('input[id^="x"]').forEach(el => el.value = '');
      Object.keys(data).forEach(id => { const el = document.getElementById(id); if(el) el.value = data[id]; });
      for(let h=0;h<N;h++){ sUpd(h); mUpd(h); }
      autoSave(); alert("復元しました");
    } catch(err){ alert("形式エラー"); }
  };
  reader.readAsText(file);
}

// 構築ロジック
function xid(h,sec,row,col){return 'x'+h+'_'+sec+'_'+row+'_'+col;}
function sfx(sym){if(!sym)return '';var m=sym.match(/[①②③④⑤]/);return m?m[0]:'';}
function clean(s){return s?s.replace(/[①②③④⑤]/g,''):'';}

function switchTab(idx){
  document.querySelectorAll('.tab-btn').forEach((b,i)=> b.classList.toggle('active', i===idx));
  document.querySelectorAll('.tab-pane').forEach((p,i)=> p.classList.toggle('active', i===idx));
}

function mkTree(h,rows,pfx,fn){
  var o='<div class="tree-wrap"><table class="tree-table"><tbody>';
  rows.forEach((row,i)=>{
    o+='<tr><td style="background:#eee;width:20px;text-align:center">'+row.sex+'</td>';
    ['a','c','e','g','i'].forEach(k=>{
      let cl = row[k];
      if(cl){
        let lbl = (pfx==='m'&&i===6&&k==='c') ? 'う' : (row[k+'L'] || '');
        let lTag = lbl ? '<span style="position:absolute;top:0;left:0;font-size:0.5rem;color:#888">'+lbl+'</span>' : '';
        o+='<td class="'+cl+'">'+lTag+'<input id="'+xid(h,pfx+'tr',i,k)+'" oninput="'+fn+'('+h+','+i+',\''+k+'\')"></td>';
      } else o+='<td style="background:#ddd"></td>';
    });
    o+='</tr>';
  });
  return o+'</tbody></table></div>';
}

function mkMtx(h,rows,sec,fn){
  var o='<div class="pedigree-wrap"><table class="pedigree-table"><thead><tr><th colspan="4">系譜</th><th>馬名</th><th>因子1</th><th>因子2</th><th>因子3</th><th>血統</th></tr></thead><tbody>';
  rows.forEach((row,i)=>{
    o+='<tr>'; row.lb.forEach(l=>o+=(l===''?'<td style="background:#eee"></td>':'<td style="text-align:center;background:#f8f8f8">'+l+'</td>'));
    o+='<td><input id="'+xid(h,sec,i,'nm')+'" oninput="'+fn+'('+h+',\''+sec+'\','+i+')" placeholder="'+(row.sym||'')+'"></td>';
    for(let f=1;f<=3;f++)o+='<td><input id="'+xid(h,sec,i,'f'+f)+'" oninput="'+fn+'('+h+',\''+sec+'\','+i+')"></td>';
    o+='<td><input id="'+xid(h,sec,i,'bl')+'" oninput="'+fn+'('+h+',\''+sec+'\','+i+')"></td></tr>';
  });
  return o+'</tbody></table></div>';
}

function mkFactorTotal(h, pfx, title){
  var o='<div class="section-card"><div style="text-align:center;font-weight:700;margin-bottom:5px;font-size:0.9rem">'+title+'</div><table class="pedigree-table" style="min-width:auto"><tr>';
  FACTORS.forEach(f=>o+='<th style="background:#eee">'+f+'</th>');
  o+='</tr><tr>';
  FACTORS.forEach(f=>o+='<td id="fc_'+h+'_'+pfx+'_'+f+'" style="text-align:center;font-weight:700;font-size:1.1rem;height:40px">0</td>');
  o+='</tr></table></div>';
}

function sUpd(h){
  let cnt={}; FACTORS.forEach(f=>cnt[f]=0);
  S_ROWS.forEach((_,i)=>{for(let f=1;f<=3;f++){let v=(document.getElementById(xid(h,'sdt',i,'f'+f))||{}).value||'';v=v.trim();if(cnt.hasOwnProperty(v))cnt[v]++;}});
  FACTORS.forEach(f=>document.getElementById('fc_'+h+'_s_'+f).textContent=cnt[f]);
  let sg=[],sb=[];
  S_ROWS.forEach((row,i)=>{let b=(document.getElementById(xid(h,'sdt',i,'bl'))||{}).value||''; if(b){if(row.bt==='sg')sg.push(b);if(row.bt==='sb')sb.push(b);}});
  setT('bsg_'+h,sg); setT('bsb_'+h,sb); finUpd(h);
}

function mUpd(h){
  let cnt={}; FACTORS.forEach(f=>cnt[f]=0);
  M3.forEach((_,i)=>{for(let f=1;f<=3;f++){let v=(document.getElementById(xid(h,'m3',i,'f'+f))||{}).value||'';v=v.trim();if(cnt.hasOwnProperty(v))cnt[v]++;}});
  FACTORS.forEach(f=>document.getElementById('fc_'+h+'_m_'+f).textContent=cnt[f]);
  let mg=[],mb=[],mp=[],ms=[];
  M1.forEach((row,i)=>{let b=(document.getElementById(xid(h,'m1',i,'bl'))||{}).value||''; if(b){if(row.bt==='m1g')mg.push(b);if(row.bt==='m1b')mb.push(b);}});
  M2.forEach((row,i)=>{let b=(document.getElementById(xid(h,'m2',i,'bl'))||{}).value||''; if(b&&row.bt==='m2p')mp.push(b);});
  M3.forEach((row,i)=>{if(row.sal){let b=(document.getElementById(xid(h,'m3',i,'bl'))||{}).value||''; if(b)ms.push(b);}});
  setT('bmg_'+h,mg);setT('bmb_'+h,mb);setT('bmp_'+h,mp);setT('bms_'+h,ms); finUpd(h);
}

function finUpd(h){
  FACTORS.forEach(f=>{
    let sv=parseInt(document.getElementById('fc_'+h+'_s_'+f).textContent||0), mv=parseInt(document.getElementById('fc_'+h+'_m_'+f).textContent||0);
    document.getElementById('fc_'+h+'_fin_'+f).textContent=sv+mv;
  });
}

function setT(eid,arr){
  document.getElementById(eid).innerHTML=arr.length?arr.map(b=>'<span class="btag">'+b+'</span>').join(''):'<span style="color:#ccc">未入力</span>';
}

function buildTab(h){
  var html='<button class="clear-btn" onclick="clearTab('+h+')">全データクリア</button>';
  html+='<div class="horse-header stallion">牡馬設定</div><div class="section-card">'+mkTree(h,S_TREE,'s','sTr')+'</div>';
  html+='<div class="section-card">'+mkMtx(h,S_ROWS,'sdt','sMx')+'</div>';
  
  // 1枚目写真の因子合計表を再現
  var fHtml='<div class="section-card"><div style="text-align:center;font-weight:700;margin-bottom:5px">因子の合計数</div><table class="pedigree-table" style="min-width:auto"><tr>';
  FACTORS.forEach(f=>fHtml+='<th style="background:#eee">'+f+'</th>');
  fHtml+='</tr><tr>';
  FACTORS.forEach(f=>fHtml+='<td id="fc_'+h+'_fin_'+f+'" style="text-align:center;font-weight:700;font-size:1.1rem;height:40px">0</td>');
  fHtml+='</tr></table></div>';
  html+=fHtml;

  html+='<div class="section-card"><div style="display:flex;gap:5px"><div style="flex:1" id="sg-box">'+mkBB('','面白い','bsg_'+h)+'</div><div style="flex:1">'+mkBB('','見事','bsb_'+h)+'</div></div></div>';
  
  html+='<div class="horse-header mare">牝馬設定</div><div class="section-card">'+mkTree(h,M_TREE,'m','mTr')+'</div>';
  html+='<div class="section-card">'+mkMtx(h,M1,'m1','mMx')+mkMtx(h,M2,'m2','mMx')+'</div>';
  
  // 牡馬・牝馬それぞれの隠し合計用
  html+='<div style="display:none"><span id="fc_'+h+'_s_速">0</span><span id="fc_'+h+'_s_長">0</span><span id="fc_'+h+'_s_短">0</span><span id="fc_'+h+'_s_中">0</span><span id="fc_'+h+'_s_走">0</span>';
  html+='<span id="fc_'+h+'_m_速">0</span><span id="fc_'+h+'_m_長">0</span><span id="fc_'+h+'_m_短">0</span><span id="fc_'+h+'_m_中">0</span><span id="fc_'+h+'_m_走">0</span></div>';
  
  html+='<div class="section-card">'+mkMtx(h,M3,'m3','mMx')+'</div>';
  document.getElementById('tab'+h).innerHTML=html;
}

// 実行用関数（グローバル）
window.sTr=(h,tr,k)=>{ let v=document.getElementById(xid(h,'str',tr,k)).value; autoSave(); sUpd(h); };
window.sMx=(h,s,i)=>{ sUpd(h); autoSave(); };
window.mMx=(h,s,i)=>{ mUpd(h); autoSave(); };
window.mTr=(h,tr,k)=>{ autoSave(); mUpd(h); };
window.clearTab=(h)=>{ if(confirm("クリアしますか？")){ document.getElementById('tab'+h).querySelectorAll('input').forEach(i=>i.value=''); sUpd(h); mUpd(h); autoSave(); }};
function mkBB(cl,ti,id){return '<div class="blood-box"><div style="font-size:0.7rem;font-weight:700">'+ti+'</div><div class="btags" id="'+id+'"></div></div>';}

// 起動
window.onload = function(){
  for(let h=0;h<N;h++) buildTab(h);
  const saved = localStorage.getItem(DB_KEY);
  if(saved){
    const data = JSON.parse(saved);
    Object.keys(data).forEach(id=>{ if(document.getElementById(id)) document.getElementById(id).value = data[id]; });
    for(let h=0;h<N;h++){ sUpd(h); mUpd(h); }
  }
};
</script>
</body>
</html>
