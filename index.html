<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Horse Bloodline - フルカラー完動版</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap');
:root {
  --bg:#f5f5f5;--surface:#fff;--text:#1a1a1a;--border:#333;
  /* 多彩な系統色を定義 */
  --tree-purple:#c8c0e8; --tree-dkgreen:#4caf50;
  --tree-e-green:#7dd87a; --tree-g-green:#b8e8b0;
  --tree-e-blue:#7ac8e8; --tree-g-blue:#b0d8f0; --tree-g-yellow:#f0e0a0;
  --tree-i-green:#daf0da; --tree-i-blue:#daeef8; --tree-i-yellow:#f8f0d0;
  --tree-purple2:#b090e0; --tree-orange:#f8c080; --tree-pink:#f8b0d0;
  --disabled:#d8d8d8;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);padding:10px;padding-bottom:100px;}

/* 操作パネル */
.save-panel { background:#333; padding:12px; border-radius:10px; margin-bottom:15px; display:flex; gap:8px; position:sticky; top:0; z-index:100; }
.io-btn { flex:1; padding:10px; border:none; border-radius:8px; font-weight:700; cursor:pointer; color:#fff; font-size:0.85rem; }
.btn-export { background:#27ae60; }
.btn-import { background:#2980b9; }

h1{text-align:center;font-size:1.1rem;margin:10px 0;border-bottom:2px solid var(--border);}
.tabs{display:flex;gap:5px;margin-bottom:10px;overflow-x:auto;}
.tab-btn{flex-shrink:0;padding:8px 15px;border:1px solid #ccc;background:#fff;border-radius:20px;cursor:pointer;font-size:0.85rem;}
.tab-btn.active{background:#555;color:#fff;font-weight:700;}
.tab-pane{display:none;}.tab-pane.active{display:block;}

/* テーブルデザイン */
.section-card{background:var(--surface);border:1px solid #ccc;border-radius:10px;padding:10px;margin-bottom:10px;}
.horse-header{text-align:center;font-size:0.95rem;font-weight:700;padding:8px;border-radius:8px;margin-bottom:10px;color:#fff;}
.stallion{background:#c0392b;}
.mare{background:#a0369a;}

.table-wrap { overflow-x:auto; margin-bottom:10px; border:1px solid var(--border); }
table { border-collapse:collapse; width:100%; min-width:550px; font-size:0.7rem; background:#fff; }
th, td { border:1px solid var(--border); height:30px; position:relative; text-align:center; }
input { width:100%; height:100%; border:none; background:transparent; padding:0 4px; font-size:0.8rem; text-align:center; }

/* 系統別カラークラス */
.col-a{background:var(--tree-purple);} .col-c{background:var(--tree-dkgreen);}
.col-eg{background:var(--tree-e-green);} .col-eb{background:var(--tree-e-blue);}
.col-gg{background:var(--tree-g-green);} .col-gb{background:var(--tree-g-blue);} .col-gy{background:var(--tree-g-yellow);}
.col-ig{background:var(--tree-i-green);} .col-ib{background:var(--tree-i-blue);} .col-iy{background:var(--tree-i-yellow);}
.col-cp{background:var(--tree-purple2);} .col-eo{background:var(--tree-orange);} .col-gp{background:var(--tree-pink);}
.locked{background:var(--disabled);}

/* 因子合計表スタイル (1枚目写真再現) */
.total-table { min-width:auto !important; margin: 0 auto; width: 100%; max-width: 400px; }
.total-table th { background: #eee; font-weight: bold; }
.total-table td { font-size: 1.2rem; font-weight: bold; height: 45px; }

.btags { display:flex; flex-wrap:wrap; gap:3px; min-height:22px; margin-top:5px; }
.btag { border-radius:4px; padding:2px 6px; font-size:0.7rem; background:rgba(255,255,255,0.7); border:1px solid rgba(0,0,0,0.2); font-weight:bold; }
.clear-btn { width:100%; padding:10px; background:#e74c3c; color:#fff; border:none; border-radius:8px; font-weight:700; margin-bottom:10px; }
</style>
</head>
<body>

<div class="save-panel">
  <button class="io-btn btn-export" onclick="manualExport()">💾 保存(書き出し)</button>
  <button class="io-btn btn-import" onclick="document.getElementById('fileInput').click()">📂 復元(読み込み)</button>
  <input type="file" id="fileInput" style="display:none" accept=".json" onchange="manualImport(event)">
</div>

<h1>牡馬 × 牝馬 血統メモ</h1>

<div class="tabs">
  <script>
    for(let i=0; i<4; i++) document.write(`<button class="tab-btn ${i===0?'active':''}" onclick="switchTab(${i})">馬 ${i+1}</button>`);
  </script>
</div>

<div id="main-content"></div>

<script>
const FACTORS = ['速','長','短','中','走'];
const N = 4;
const DB_KEY = 'UMA_COLOR_FULL_V3';

// 牡馬ツリー定義
const S_TREE_DEF = [
  { sex:'♂', cells:[ {k:'a',c:'col-a'}, {k:'c',c:'col-c'}, {k:'e',c:'col-eg',l:'G'}, {k:'g',c:'col-gg',l:'D'}, {k:'i',c:'col-ig',l:'A'} ] },
  { sex:'♀', cells:[ {k:'a',c:'col-a'}, {k:'c',c:'col-c'}, {k:'e',c:'col-eg'}, {k:'g',c:'col-gg'}, {k:'i',c:'col-ig'} ] },
  { sex:'♂', cells:[ {k:'e',c:'col-eb'}, {k:'g',c:'col-gb',l:'E'}, {k:'i',c:'col-ib',l:'B'} ] },
  { sex:'♀', cells:[ {k:'e',c:'col-eb'}, {k:'g',c:'col-gb'}, {k:'i',c:'col-ib'} ] },
  { sex:'♂', cells:[ {k:'g',c:'col-gy',l:'F'}, {k:'i',c:'col-iy',l:'C'} ] },
  { sex:'♀', cells:[ {k:'g',c:'col-gy'}, {k:'i',c:'col-iy'} ] }
];

// 牝馬ツリー定義 (追加色反映)
const M_TREE_DEF = [
  { sex:'♂', cells:[ {k:'a',c:'col-a'}, {k:'c',c:'col-c'}, {k:'e',c:'col-eg',l:'g'}, {k:'g',c:'col-gg',l:'d'}, {k:'i',c:'col-ig',l:'a'} ] },
  { sex:'♀', cells:[ {k:'a',c:'col-a'}, {k:'c',c:'col-c'}, {k:'e',c:'col-eg'}, {k:'g',c:'col-gg'}, {k:'i',c:'col-ig'} ] },
  { sex:'♂', cells:[ {k:'e',c:'col-eb'}, {k:'g',c:'col-gb',l:'e'}, {k:'i',c:'col-ib',l:'b'} ] },
  { sex:'♀', cells:[ {k:'e',c:'col-eb'}, {k:'g',c:'col-gb'}, {k:'i',c:'col-ib'} ] },
  { sex:'♂', cells:[ {k:'g',c:'col-gy',l:'f'}, {k:'i',c:'col-iy',l:'c'} ] },
  { sex:'♀', cells:[ {k:'g',c:'col-gy'}, {k:'i',c:'col-iy'} ] },
  { sex:'♂', cells:[ {k:'c',c:'col-cp',l:'う'}, {k:'e',c:'col-eo',l:'い'}, {k:'g',c:'col-gp',l:'あ'} ] },
  { sex:'♀', cells:[ {k:'c',c:'col-cp'}, {k:'e',c:'col-eo'}, {k:'g',c:'col-gp'} ] }
];

function build() {
  let html = '';
  for(let h=0; h<N; h++) {
    html += `<div id="tab${h}" class="tab-pane ${h===0?'active':''}">`;
    html += `<button class="clear-btn" onclick="clearData(${h})">この馬のデータを削除</button>`;
    
    // 牡馬・牝馬の掛け合わせ表
    html += `<div class="horse-header stallion">牡馬：血統掛け合わせ</div>`;
    html += `<div class="section-card"><div class="table-wrap"><table>` + renderTree(h, 's', S_TREE_DEF) + `</table></div></div>`;
    
    html += `<div class="horse-header mare">牝馬：血統掛け合わせ</div>`;
    html += `<div class="section-card"><div class="table-wrap"><table>` + renderTree(h, 'm', M_TREE_DEF) + `</table></div></div>`;

    // 因子合計 (1枚目写真再現)
    html += `<div class="section-card"><div style="text-align:center;font-weight:700;margin-bottom:5px;font-size:0.9rem">因子の合計数 (速・長・短・中・走)</div>`;
    html += `<div class="table-wrap"><table class="total-table"><tr>`;
    FACTORS.forEach(f => html += `<th>${f}</th>`);
    html += `</tr><tr>`;
    FACTORS.forEach(f => html += `<td id="x${h}_sum_${f}">0</td>`);
    html += `</tr></table></div></div>`;

    // 面白い・見事タグまとめ
    html += `<div class="section-card"><div style="display:flex;gap:5px">`;
    html += `<div style="flex:1;border:1px solid #aaa;padding:5px;border-radius:5px"><div style="font-size:0.7rem;font-weight:700">面白い血統</div><div id="x${h}_tag_o" class="btags"></div></div>`;
    html += `<div style="flex:1;border:1px solid #aaa;padding:5px;border-radius:5px"><div style="font-size:0.7rem;font-weight:700">見事な血統</div><div id="x${h}_tag_m" class="btags"></div></div>`;
    html += `</div></div>`;

    // 因子・血統詳細
    html += `<div class="horse-header stallion" style="background:#444">詳細データ入力</div>`;
    html += `<div class="section-card"><div class="table-wrap"><table>`;
    html += `<tr style="background:#eee"><td>型</td><td>馬名</td><td>因子1</td><td>因子2</td><td>因子3</td><td>血統背景</td></tr>`;
    for(let i=0; i<15; i++) {
        html += `<tr><td class="locked">${i+1}</td>`;
        html += `<td><input id="x${h}_d_${i}_nm" oninput="update(${h})"></td>`;
        for(let f=1; f<=3; f++) html += `<td><input id="x${h}_d_${i}_f${f}" oninput="update(${h})"></td>`;
        html += `<td><input id="x${h}_d_${i}_bl" oninput="update(${h})"></td></tr>`;
    }
    html += `</table></div></div></div>`;
  }
  document.getElementById('main-content').innerHTML = html;
}

function renderTree(h, pfx, def) {
  let res = '';
  def.forEach((row, rIdx) => {
    res += `<tr><td class="locked" style="width:25px">${row.sex}</td>`;
    ['a','c','e','g','i'].forEach(k => {
      let col = row.cells.find(c => c.k === k);
      if(col) {
        let lbl = col.l ? `<span style="position:absolute;top:0;left:0;font-size:0.5rem;color:#333">${col.l}</span>` : '';
        res += `<td class="${col.c}">${lbl}<input id="x${h}_${pfx}_${rIdx}_${k}" oninput="update(${h})"></td>`;
      } else res += `<td class="locked"></td>`;
    });
    res += `</tr>`;
  });
  return res;
}

function switchTab(idx) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', i===idx));
  document.querySelectorAll('.tab-pane').forEach((p,i) => p.classList.toggle('active', i===idx));
}

function update(h) {
  let f_cnt = {}; FACTORS.forEach(f => f_cnt[f] = 0);
  let o_tags = []; let m_tags = [];
  
  // 詳細データからの集計
  for(let i=0; i<15; i++) {
    for(let f=1; f<=3; f++) {
      let val = document.getElementById(`x${h}_d_${i}_f${f}`).value.trim();
      if(FACTORS.includes(val)) f_cnt[val]++;
    }
    let bl = document.getElementById(`x${h}_d_${i}_bl`).value.trim();
    if(bl) {
        if(i < 8) o_tags.push(bl);
        else m_tags.push(bl);
    }
  }

  FACTORS.forEach(f => document.getElementById(`x${h}_sum_${f}`).innerText = f_cnt[f]);
  document.getElementById(`x${h}_tag_o`).innerHTML = o_tags.map(t => `<span class="btag">${t}</span>`).join('');
  document.getElementById(`x${h}_tag_m`).innerHTML = m_tags.map(t => `<span class="btag">${t}</span>`).join('');
  save();
}

function save() {
  const data = {};
  document.querySelectorAll('input').forEach(el => { if(el.value) data[el.id] = el.value; });
  localStorage.setItem(DB_KEY, JSON.stringify(data));
}

function load() {
  const saved = localStorage.getItem(DB_KEY);
  if(!saved) return;
  const data = JSON.parse(saved);
  Object.keys(data).forEach(id => { if(document.getElementById(id)) document.getElementById(id).value = data[id]; });
  for(let h=0; h<N; h++) update(h);
}

function manualExport() {
  const data = localStorage.getItem(DB_KEY);
  const blob = new Blob([data], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'uma_bloodline_backup.json';
  a.click();
}

function manualImport(e) {
  const file = e.target.files[0];
  const reader = new FileReader();
  reader.onload = (ev) => {
    localStorage.setItem(DB_KEY, ev.target.result);
    location.reload();
  };
  reader.readAsText(file);
}

function clearData(h) {
  if(confirm('この馬の全データを削除しますか？')) {
    document.querySelectorAll(`[id^="x${h}_"]`).forEach(el => el.value = '');
    update(h);
  }
}

window.onload = () => { build(); load(); };
</script>
</body>
</html>
